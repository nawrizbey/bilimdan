services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bilimdon
      POSTGRES_PASSWORD: bilimdon
      POSTGRES_DB: bilimdon
    ports:
      - '5432:5432'
    volumes:
      - bilimdon_pgdata:/var/lib/postgresql/data

volumes:
  bilimdon_pgdata:
